<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE VAULT | OS v9.0</title>
    <style>
        :root { --gold: #ffcc00; --dark: #0a0a0a; --gray: #1a1a1a; --text: #e0e0e0; }
        body { background: var(--dark); color: var(--text); font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        /* THE GHOST SHELL SEARCH */
        .header { background: #000; padding: 20px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        #ghost-search { background: transparent; border: 1px solid #333; color: var(--gold); padding: 10px; width: 300px; font-size: 14px; outline: none; transition: 0.3s; }
        #ghost-search:focus { border-color: var(--gold); box-shadow: 0 0 10px var(--gold); width: 400px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--gray); border: 1px solid #333; transition: 0.3s; overflow: hidden; position: relative; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255, 204, 0, 0.2); }
        
        /* THUMBNAIL FALLBACK */
        .thumb { width: 100%; height: 120px; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .vault-door { width: 50px; height: 50px; border: 4px dashed #333; border-radius: 50%; }

        .info { padding: 10px; font-size: 12px; }
        .btn-init { background: var(--gold); color: #000; border: none; width: 100%; padding: 8px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        
        .footer { padding: 10px; font-size: 10px; text-align: center; border-top: 1px solid #222; margin-top: 20px; opacity: 0.6; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; color: var(--gold);">VAULT-OS // <span id="sys-info">3060_ONLINE</span></div>
    <input type="text" id="ghost-search" placeholder="GHOST_SHELL: SEARCH ARCHIVE...">
</div>

<div class="grid" id="game-grid">
    </div>

<div class="footer">
    SYSTEM ARCHITECT: drewski | BUILT FOR THE DISTRICT RESOURCE ARCHIVE
</div>

<script>
    const grid = document.getElementById('game-grid');
    const search = document.getElementById('ghost-search');
    let gameData = [];

    // FIX: Trying multiple potential filenames to avoid 404
    async function loadArchive() {
        const filenames = ['games (1).json', 'games.json'];
        for (let name of filenames) {
            try {
                const response = await fetch(name);
                if (response.ok) {
                    gameData = await response.json();
                    renderArchive(gameData);
                    console.log(`[SUCCESS] Archive loaded via ${name}`);
                    return;
                }
            } catch (e) { continue; }
        }
        grid.innerHTML = `<div style="color:red">ERROR: ARCHIVE NOT FOUND. Ensure your JSON file is in the same folder.</div>`;
    }

    function renderArchive(data) {
        grid.innerHTML = '';
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            // FIX: Using an error handler for broken thumbnails
            card.innerHTML = `
                <div class="thumb">
                    <img src="${item.thumb}" onerror="this.outerHTML='<div class=\'vault-door\'></div>'">
                </div>
                <div class="info">
                    <div style="color:var(--gold); margin-bottom:4px;">#${item.id}</div>
                    <div style="white-space:nowrap; overflow:hidden;">${item.title}</div>
                    <button class="btn-init" onclick="launchGame('${item.url}')">INITIALIZE</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // STEALTH LAUNCH (Bypasses some iFrame blocks)
    function launchGame(url) {
        const win = window.open('about:blank', '_blank');
        const iframe = win.document.createElement('iframe');
        iframe.style.width = '100%'; iframe.style.height = '100%';
        iframe.style.border = 'none'; iframe.src = url;
        win.document.body.style.margin = '0';
        win.document.body.appendChild(iframe);
    }

    // SEARCH LOGIC
    search.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = gameData.filter(g => 
            g.title.toLowerCase().includes(term) || 
            g.id.toString().includes(term)
        );
        renderArchive(filtered);
    });

    loadArchive();
</script>

</body>
</html>
