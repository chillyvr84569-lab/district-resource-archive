<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault-OS V.7.2</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0d0d0d; }
        body { margin: 0; background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace; overflow: hidden; text-transform: uppercase; }
        
        /* THE CRT LOOK */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        #status-bar { display: flex; justify-content: space-between; padding: 10px 20px; border-bottom: 2px solid var(--gold); background: #000; font-size: 14px; }
        nav { display: flex; justify-content: center; padding: 10px; background: #000; border-bottom: 1px solid #333; }
        
        .tab-btn { background: none; border: 1px solid var(--gold); color: #886b00; padding: 10px 30px; cursor: pointer; font-family: inherit; margin: 0 5px; }
        .tab-btn.active { color: var(--gold); box-shadow: 0 0 15px var(--gold); background: rgba(255, 204, 0, 0.1); }

        .tab-content { display: none; height: calc(100vh - 110px); overflow-y: auto; text-align: center; width: 100%; }
        .tab-content.active { display: block; }

        .vault-logo { font-size: 80px; font-weight: bold; margin-top: 100px; text-shadow: 0 0 20px var(--gold); }
        .terminal-input { width: 70%; max-width: 700px; background: #000; border: 2px solid var(--gold); color: var(--gold); padding: 25px; font-size: 24px; font-family: inherit; outline: none; margin-top: 40px; box-shadow: inset 0 0 10px var(--gold); }

        #vault-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; padding: 40px; }
        .gold-card { background: #1a1a1a; border: 1px solid var(--gold); padding: 15px; }
        .init-btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 12px; margin-top: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status-bar">
        <div id="reactor-clock">REACTOR: 00:00:00</div>
        <div>VAULT-OS V.7.2 [FIXED]</div>
        <div id="battery-status">CELL: --%</div>
    </div>

    <nav>
        <button id="btn-term" class="tab-btn active" onclick="switchTab('terminal')">TERMINAL</button>
        <button id="btn-vault" class="tab-btn" onclick="switchTab('vault')">THE VAULT</button>
    </nav>

    <div id="tab-terminal" class="tab-content active">
        <h1 class="vault-logo">[ GOLD ]</h1>
        <p>ENCRYPTED WEB ACCESS</p>
        <input type="text" id="proxy-input" class="terminal-input" placeholder=">_ ENTER URL OR SEARCH..." autocomplete="off" autofocus>
    </div>

    <div id="tab-vault" class="tab-content">
        <div id="vault-grid"><p>LOADING ARCHIVES...</p></div>
    </div>

    <script>
        // 1. CLOCK & BATTERY
        function updateUI() {
            const now = new Date();
            document.getElementById('reactor-clock').innerText = `REACTOR: ${now.toTimeString().split(' ')[0]}`;
            if (navigator.getBattery) {
                navigator.getBattery().then(bat => {
                    document.getElementById('battery-status').innerText = `CELL: ${Math.floor(bat.level * 100)}%`;
                });
            }
        }
        setInterval(updateUI, 1000);

        // 2. TAB LOGIC (REPAIRED)
        function switchTab(type) {
            document.getElementById('tab-terminal').classList.remove('active');
            document.getElementById('tab-vault').classList.remove('active');
            document.getElementById('btn-term').classList.remove('active');
            document.getElementById('btn-vault').classList.remove('active');

            if (type === 'terminal') {
                document.getElementById('tab-terminal').classList.add('active');
                document.getElementById('btn-term').classList.add('active');
            } else {
                document.getElementById('tab-vault').classList.add('active');
                document.getElementById('btn-vault').classList.add('active');
                loadVault();
            }
        }

        // 3. PROXY LAUNCHER
        document.getElementById('proxy-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                let val = e.target.value.trim();
                let target = val.includes('.') ? (val.startsWith('http') ? val : `https://${val}`) : `https://www.google.com/search?q=${encodeURIComponent(val)}`;
                window.open('https://api.allorigins.win/raw?url=' + encodeURIComponent(target), '_blank');
            }
        });

        // 4. GAME LOADER
        async function loadVault() {
            const grid = document.getElementById('vault-grid');
            try {
                const res = await fetch('./games.json');
                if (!res.ok) throw new Error("File not found at root");
                const data = await res.json();
                grid.innerHTML = data.map(item => `
                    <div class="gold-card">
                        <img src="${item.thumb}" style="width:100%" onerror="this.src='https://placehold.co/200x120?text=NO+SIGNAL'">
                        <div>${item.title}</div>
                        <button class="init-btn" onclick="window.open('${item.url}')">INITIALIZE</button>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `<p style="color:red">ERROR: ${err.message}</p>`;
            }
        }
        updateUI();
    </script>
</body>
</html>
