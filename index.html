<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault-OS | DREWSKI</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --surface: #111; --glow: rgba(255, 204, 0, 0.4); }
        body { margin: 0; background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace; overflow: hidden; text-transform: uppercase; }
        
        /* CRT SCANLINES & OVERLAY */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 1000; pointer-events: none; background-size: 100% 4px, 100% 100%;
        }

        /* STATUS BAR */
        #status-bar { display: flex; justify-content: space-between; padding: 12px 25px; border-bottom: 2px solid var(--gold); background: #000; font-size: 12px; position: relative; z-index: 111; font-weight: bold;}
        
        /* NAVIGATION */
        nav { display: flex; justify-content: center; padding: 15px; background: #000; border-bottom: 1px solid #222; position: relative; z-index: 111;}
        .tab-btn { background: none; border: 1px solid var(--gold); color: #665200; padding: 10px 40px; cursor: pointer; font-family: inherit; margin: 0 10px; transition: 0.3s; font-weight: bold; letter-spacing: 2px;}
        .tab-btn.active { color: var(--gold); box-shadow: 0 0 20px var(--gold); background: rgba(255, 204, 0, 0.15); border-color: #fff; }
        .tab-btn:hover { background: rgba(255, 204, 0, 0.1); color: var(--gold); }

        .tab-content { display: none; height: calc(100vh - 130px); overflow-y: auto; text-align: center; width: 100%; position: relative; z-index: 11; }
        .tab-content.active { display: block; }

        /* TAB 1: TERMINAL (PROXY) */
        .glitch { font-size: 60px; font-weight: bold; margin-top: 15vh; text-shadow: 3px 3px var(--gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .terminal-input { 
            width: 70%; max-width: 700px; background: transparent; border: none; border-bottom: 3px solid var(--gold);
            color: var(--gold); padding: 20px; font-size: 28px; font-family: inherit; 
            outline: none; margin-top: 50px; text-align: center;
        }

        /* TAB 2: THE VAULT GRID */
        .vault-controls { padding: 25px; position: sticky; top: 0; background: var(--bg); z-index: 12; border-bottom: 1px solid #222; display: flex; justify-content: center; }
        #vault-search { background: #000; border: 1px solid var(--gold); color: var(--gold); padding: 12px; width: 80%; max-width: 600px; font-family: inherit; outline: none; font-size: 16px; text-align: center; }
        
        #vault-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; padding: 40px; }
        .gold-card { background: var(--surface); border: 1px solid #333; transition: 0.3s; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .gold-card:hover { border-color: var(--gold); box-shadow: 0 0 30px var(--glow); transform: translateY(-8px); }
        
        .card-img { width: 100%; height: 150px; object-fit: cover; border-bottom: 1px solid var(--gold); background: #000; }
        .placeholder-icon { width: 100%; height: 150px; display: flex; align-items: center; justify-content: center; background: #000; border-bottom: 1px solid #222; }
        .placeholder-icon svg { width: 60px; fill: #222; }

        .init-btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: inherit; font-size: 14px; }
        .init-btn:hover { background: #fff; letter-spacing: 3px; }

        .sys-credit { font-size: 11px; color: #444; margin-top: 30px; letter-spacing: 5px; font-weight: bold; }
        #batt-icon { color: #00ff00; font-weight: bold; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); }
    </style>
</head>
<body>

    <div id="status-bar">
        <div id="live-clock">00:00:00 AM</div>
        <div style="letter-spacing: 3px; color: #fff;">VAULT-OS // ENGINEERED BY DREWSKI</div>
        <div id="batt-info">PWR_BANK: <span id="batt-icon">100%</span></div>
    </div>

    <nav>
        <button id="btn-term" class="tab-btn active" onclick="switchTab('terminal')">TERMINAL</button>
        <button id="btn-vault" class="tab-btn" onclick="switchTab('vault')">THE VAULT</button>
    </nav>

    <div id="tab-terminal" class="tab-content active">
        <div class="glitch">[ SYSTEM_BYPASS ]</div>
        <input type="text" id="proxy-input" class="terminal-input" placeholder="INPUT TARGET URL OR QUERY..." autocomplete="off" autofocus>
        <div class="sys-credit">SYSTEM ARCHITECT: DREWSKI // RTX-3060_OPTIMIZED</div>
    </div>

    <div id="tab-vault" class="tab-content">
        <div class="vault-controls">
            <input type="text" id="vault-search" placeholder="SEARCHING 10,000+ SECURE FILES..." oninput="filterVault()">
        </div>
        <div id="vault-grid">
            <p>SYNCING DATA STREAM...</p>
        </div>
    </div>

    <script>
        let allGames = [];
        const vaultDoor = `<svg viewBox="0 0 24 24"><path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5zm10.5-3.5c0-.33-.02-.66-.06-.98l2.03-1.58-1.93-3.34-2.4.97c-.5-.38-1.04-.7-1.63-.95l-.36-2.54h-3.86l-.36 2.54c-.59.24-1.13.57-1.63.95l-2.4-.97-1.93 3.34 2.03 1.58c-.04.32-.06.65-.06.98s.02.66.06.98l-2.03 1.58 1.93 3.34 2.4-.97c.5.38 1.04.7 1.63.95l.36 2.54h3.86l.36-2.54c.59-.24 1.13-.57 1.63-.95l2.4.97 1.93-3.34-2.03-1.58c.04-.32.06-.65.06-.98z"/></svg>`;

        // LIVE UPDATES
        function updateStatus() {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateStatus, 1000);
        updateStatus();

        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                const u = () => document.getElementById('batt-icon').innerText = `${Math.round(b.level * 100)}%`;
                u(); b.onlevelchange = u;
            });
        }

        // CLOAKING ENGINE (The Proxy Launch)
        function cloak(url) {
            const win = window.open('about:blank', '_blank');
            if (!win) return alert("VAULT ACCESS DENIED: ENABLE POPUPS");
            win.document.body.style.margin = "0";
            win.document.body.style.height = "100vh";
            win.document.body.style.backgroundColor = "#000";
            const iframe = win.document.createElement('iframe');
            iframe.style = "width:100%; height:100%; border:none; outline:none;";
            iframe.referrerPolicy = "no-referrer";
            iframe.src = url;
            win.document.body.appendChild(iframe);
        }

        // TAB NAVIGATION
        function switchTab(type) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');
            document.getElementById(`btn-${type === 'terminal' ? 'term' : 'vault'}`).classList.add('active');
            if (type === 'vault' && allGames.length === 0) loadVault();
        }

        // TERMINAL INPUT (PROXY SEARCH)
        document.getElementById('proxy-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.trim();
                if (!val) return;
                const target = val.includes('.') ? (val.startsWith('http') ? val : `https://${val}`) : `https://duckduckgo.com/?q=${encodeURIComponent(val)}&kp=-1`;
                cloak(target);
            }
        });

        // DATA LOADING
        async function loadVault() {
            const grid = document.getElementById('vault-grid');
            const files = ['games (1).json', 'games.json'];
            
            for (let f of files) {
                try {
                    const res = await fetch(f + '?nocache=' + Date.now());
                    if (!res.ok) continue;
                    allGames = await res.json();
                    renderGames(allGames.slice(0, 500)); // Renders 500 at once for your RTX 3060
                    return;
                } catch (e) { console.log("Stream offline, switching source..."); }
            }
            grid.innerHTML = `<p style="color:red; padding:50px;">CRITICAL ERROR: games (1).json DATASTREAM OFFLINE</p>`;
        }

        function renderGames(data) {
            const grid = document.getElementById('vault-grid');
            grid.innerHTML = data.map(g => `
                <div class="gold-card">
                    <div class="thumb-container">
                        <img class="card-img" src="${g.thumb}" onerror="this.parentElement.innerHTML='<div class=\'placeholder-icon\'>${vaultDoor}</div>'">
                    </div>
                    <div style="padding:15px; flex-grow: 1;">
                        <div style="font-size:10px; color:#444; margin-bottom:5px;">ARCHIVE_ID: ${g.id}</div>
                        <div style="font-weight:bold; font-size:14px; color:var(--gold);">${g.title}</div>
                    </div>
                    <button class="init-btn" onclick="cloak('${g.url}')">INITIALIZE_FILE</button>
                </div>
            `).join('');
        }

        function filterVault() {
            const term = document.getElementById('vault-search').value.toLowerCase();
            const filtered = allGames.filter(g => 
                g.title.toLowerCase().includes(term) || 
                g.id.toString().includes(term)
            );
            renderGames(filtered.slice(0, 500));
        }
    </script>
</body>
</html>
