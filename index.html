<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault-OS V.8.0 | SYSTEM</title>
    <style>
        :root { --gold: #ffcc00; --bg: #050505; --surface: #111; }
        body { margin: 0; background: var(--bg); color: var(--gold); font-family: 'Courier New', monospace; overflow: hidden; text-transform: uppercase; }
        
        /* SCANLINES */
        body::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 100; background-size: 100% 4px, 100% 100%; pointer-events: none;
        }

        #status-bar { display: flex; justify-content: space-between; padding: 10px 20px; border-bottom: 2px solid var(--gold); background: #000; font-size: 12px; position: relative; z-index: 11;}
        nav { display: flex; justify-content: center; padding: 10px; background: #000; border-bottom: 1px solid #222; position: relative; z-index: 11;}
        
        .tab-btn { background: none; border: 1px solid var(--gold); color: #665200; padding: 10px 40px; cursor: pointer; font-family: inherit; margin: 0 10px; transition: 0.3s; font-weight: bold;}
        .tab-btn.active { color: var(--gold); box-shadow: 0 0 20px var(--gold); background: rgba(255, 204, 0, 0.15); border-color: #fff; }
        .tab-btn:hover { background: rgba(255, 204, 0, 0.1); color: var(--gold); }

        .tab-content { display: none; height: calc(100vh - 110px); overflow-y: auto; text-align: center; width: 100%; position: relative; z-index: 11; }
        .tab-content.active { display: block; }

        /* SEARCH TERMINAL UI */
        .terminal-container { margin-top: 10vh; }
        .glitch { font-size: 60px; font-weight: bold; text-shadow: 2px 2px var(--gold); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .terminal-input { 
            width: 70%; max-width: 600px; background: transparent; border: none; border-bottom: 2px solid var(--gold);
            color: var(--gold); padding: 15px; font-size: 24px; font-family: inherit; 
            outline: none; margin-top: 40px; text-align: center;
        }

        /* VAULT GRID */
        #vault-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 40px; }
        .gold-card { background: var(--surface); border: 1px solid #333; padding: 0; transition: 0.3s; position: relative; overflow: hidden; }
        .gold-card:hover { border-color: var(--gold); box-shadow: 0 0 30px rgba(255, 204, 0, 0.4); transform: translateY(-5px); }
        
        .card-img { width: 100%; height: 160px; object-fit: cover; border-bottom: 1px solid var(--gold); opacity: 0.8; transition: 0.5s; }
        .gold-card:hover .card-img { opacity: 1; filter: contrast(1.2); }
        
        .card-info { padding: 15px; background: #000; }
        .init-btn { background: var(--gold); color: #000; border: none; width: 100%; padding: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .init-btn:hover { background: #fff; letter-spacing: 2px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); }
    </style>
</head>
<body>

    <div id="status-bar">
        <div id="reactor-clock">SYSTEM_TIME: --:--:--</div>
        <div>VAULT-OS V.8.0 // RTX-3060_LINKED</div>
        <div id="status-tag">STATUS: BREACH_READY</div>
    </div>

    <nav>
        <button id="btn-term" class="tab-btn active" onclick="switchTab('terminal')">TERMINAL</button>
        <button id="btn-vault" class="tab-btn" onclick="switchTab('vault')">THE VAULT</button>
    </nav>

    <div id="tab-terminal" class="tab-content active">
        <div class="terminal-container">
            <div class="glitch">[ VAULT_ENTRY ]</div>
            <p style="letter-spacing: 5px; font-size: 10px; color: #555;">ENCRYPTED BYPASS ACTIVE</p>
            <input type="text" id="proxy-input" class="terminal-input" placeholder="SEARCH DESTINATION..." autocomplete="off" autofocus>
            <p id="typing-feedback" style="font-size: 12px; margin-top: 20px; color: #444;"></p>
        </div>
    </div>

    <div id="tab-vault" class="tab-content">
        <div id="vault-grid"><p>DECRYPTING ARCHIVE FILES...</p></div>
    </div>

    <script>
        // DATA-URI Placeholder Image (A gold gear SVG that never breaks)
        const placeholderImg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffcc00'%3E%3Cpath d='M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5zm10.5-3.5c0-.33-.02-.66-.06-.98l2.03-1.58-1.93-3.34-2.4.97c-.5-.38-1.04-.7-1.63-.95l-.36-2.54h-3.86l-.36 2.54c-.59.24-1.13.57-1.63.95l-2.4-.97-1.93 3.34 2.03 1.58c-.04.32-.06.65-.06.98s.02.66.06.98l-2.03 1.58 1.93 3.34 2.4-.97c.5.38 1.04.7 1.63.95l.36 2.54h3.86l.36-2.54c.59-.24 1.13-.57 1.63-.95l2.4.97 1.93-3.34-2.03-1.58c.04-.32.06-.65.06-.98z'/%3E%3C/svg%3E";

        function updateUI() {
            document.getElementById('reactor-clock').innerText = `SYSTEM_TIME: ${new Date().toLocaleTimeString()}`;
        }
        setInterval(updateUI, 1000);

        function switchTab(type) {
            document.querySelectorAll('.tab-content, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${type}`).classList.add('active');
            document.getElementById(`btn-${type === 'terminal' ? 'term' : 'vault'}`).classList.add('active');
            if (type === 'vault') loadVault();
        }

        function cloak(url) {
            const win = window.open('about:blank', '_blank');
            if (!win) return alert("VAULT_BLOCKED: ENABLE POP-UPS");
            win.document.body.style.margin = "0";
            win.document.body.style.backgroundColor = "#000";
            const iframe = win.document.createElement('iframe');
            iframe.style = "width:100%; height:100vh; border:none;";
            iframe.referrerPolicy = "no-referrer";
            iframe.src = url;
            win.document.body.appendChild(iframe);
        }

        // TERMINAL LOGIC
        const searchInput = document.getElementById('proxy-input');
        const feedback = document.getElementById('typing-feedback');
        
        searchInput.addEventListener('input', (e) => {
            feedback.innerText = `SCANNING: ${e.target.value.toUpperCase()}...`;
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.trim();
                if (!val) return;
                const target = val.includes('.') ? (val.startsWith('http') ? val : `https://${val}`) : `https://duckduckgo.com/?q=${encodeURIComponent(val)}&kp=-1`;
                cloak(target);
            }
        });

        async function loadVault() {
            const grid = document.getElementById('vault-grid');
            const repoPath = 'https://raw.githubusercontent.com/chillyvr84569-lab/district-resource-archive/main/games.json';
            
            try {
                const res = await fetch(repoPath + '?v=' + Math.random());
                const data = await res.json();
                
                grid.innerHTML = data.map(game => `
                    <div class="gold-card">
                        <img class="card-img" src="${game.thumb}" onerror="this.src='${placeholderImg}'">
                        <div class="card-info">
                            <div style="font-weight:bold; height: 20px; overflow:hidden;">${game.title}</div>
                            <button class="init-btn" onclick="cloak('${game.url}')">INITIALIZE</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = `<div style="color:red; padding: 40px;">CRITICAL: ARCHIVE_FILE_MISSING</div>`;
            }
        }
    </script>
</body>
</html>
